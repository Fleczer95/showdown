plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.gameservices'
version = '1.0.0'

android {
  namespace "expo.modules.gameservices"
  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
}

dependencies {
  implementation 'com.google.android.gms:play-services-games-v2:21.0.0'
}
