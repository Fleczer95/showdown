<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ShowDown Challenge</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #1a1a2e;
                color: #fff;
                font-family:
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    sans-serif;
                text-align: center;
            }
            .card {
                padding: 32px;
                max-width: 360px;
            }
            h1 {
                font-size: 22px;
                margin: 0 0 8px;
            }
            p {
                color: #b8b8c8;
                line-height: 1.5;
            }
            a.btn {
                display: block;
                margin: 12px 0;
                padding: 14px;
                border-radius: 14px;
                background: #e94560;
                color: #fff;
                text-decoration: none;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <!--
      Store-redirect fallback shown only when the app is NOT installed (an
      installed app intercepts /c/* via Universal/App Links before this loads).
      Replace the two store URLs once the listings are live.
    -->
        <div class="card">
            <h1>🏆 You've been challenged!</h1>
            <p>Install ShowDown to take this challenge and see who wins.</p>
            <a class="btn" href="https://apps.apple.com/app/id6774886649">Download on the App Store</a>
            <a class="btn" href="https://play.google.com/store/apps/details?id=com.showdown.app">Get it on Google Play</a>
        </div>
    </body>
</html>
